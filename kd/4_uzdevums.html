<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>HTML formas 4.uzd</title>
    </head>
    <body>
    <h1>My feedback form</h1>

    <form>
        <ul>
            <li>
                <label for="firstName">Name: </label>
                <input type="text" id="firstName"/>
            </li>
            <li>
                <label for="email">Email: </label>
                <input type="email" id="email"/>
            </li>
            <li>
                <label for="psw">Password: </label>
                <input type="password" id="psw"/>
            </li>
            <br>
            <li>
                <label>Please check all the emotions that apply to you:</label>
                <ul>
                    <li>
                        <label for="angry">Angry</label>
                        <input type="checkbox" id="angry" name="emotions"/>
                    </li>
                    <li>
                        <label for="sad">Sad</label>
                        <input type="checkbox" id="sad" name="emotions"/>
                    </li>
                    <li>
                        <label for="happy">Happy</label>
                        <input type="checkbox" id="happy" name="emotions"/>
                    </li>
                    <li>
                        <label for="ambivalent">Ambivalent</label>
                        <input type="checkbox" id="ambivalent" name="emotions"/>
                    </li>
                </ul>
            </li>
            <li>
                <label>How satisfied were you with our sevice?</label>
                <ul>
                    <li>
                        <label for="very_sat">Very satisfied</label>
                        <input type="radio" id="very_sat" name="satisfied_lvl"/>
                    </li>
                    <li>
                        <label for="satisfied">Satisfied</label>
                        <input type="radio" id="satisfied" name="satisfied_lvl"/>
                    </li>
                    <li>
                        <label for="didnt_care">Didn't care</label>
                        <input type="radio" id="didnt_care" name="satisfied_lvl"/>
                    </li>
                    <li>
                        <label for="dissatisfied">Dissatisfied</label>
                        <input type="radio" id="dissatisfied" name="satisfied_lvl"/>
                    </li>
                    <li>
                        <label for="very_dis">Very dissatisfied</label>
                        <input type="radio" id="very_dis" name="satisfied_lvl"/>
                    </li>
                </ul>
            </li>
            <li>
                <label for="comments">Further comments:</label>
                <textarea rows="3" id="comments"></textarea>
            </li>
            <li>
                <label for="visit_loc">Location visited:</label>
                <select id="visit_loc" name="location">
                    <option value="default" selected disabled>Select location</option>
                    <option value="german">German</option>
                    <option value="latvia">Latvia</option>
                    <option value="lithuania">Lithuania</option>
                    <option value="estonia">Estonia</option>
                    <option value="romania">Romania</option>
                </select>
            </li>
        </ul>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
