<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ievads</title>
    <!-- Link elements (birka) ļauj lietotājam savienot ĀRĒJOS CSS failus ar HTML -->
    <!-- href="" - atribūts norāda kur atrodas CSS fails-->
    <!-- rel="" - atribūts norāda kāds tips būs failam (STYLESHEET - CSS)-->
    <link href="style.css" rel="stylesheet"/>

</head>
    <body>
        <!-- id ir unikāls, nedrīkst atkārtoties vairāk par 1 reizi.
        Šis ir līdzīgi kā cilvēks, kuram ir unikāls personas kods. 
        -->
        <h1 id="title">CSS Ievads. Viss par un ap CSS.</h1>

       <!-- <h1 id="title"> Vēlviens virsraksts </h1>-->

        <!-- 
            class atribūtu var izmantot vairākās vietās HTML kodā.
            Šis ir līdzīgi kā cilvēka apģērbs, vairākiem var būt 
            vienādi/identiski apģērba gabali.
            -->

            <div id="imageContainer"> 
            <img class="images" src="https://www.alleycat.org/wp-content/uploads/2019/03/FELV-cat.jpg" alt="attels_viens" />
            
            <img class="images" src="https://www.orangepet.in/cdn/shop/articles/selective-closeup-cute-kitten-floor_1_800x.jpg" alt="attels_divi" />

            <img class="images" src="https://d2zp5xs5cp8zlg.cloudfront.net/image-79322-800.jpg" alt="attels_tris" />

            </div>
        </body>
</html>
